; ESP32 camera monitor project for OV5640 modules.
; Select the camera pin map in src/camera_pins.h before flashing.

[platformio]
default_envs = esp32cam_ov5640

[env:esp32cam_ov5640]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 921600
upload_speed = 115200
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0
